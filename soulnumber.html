<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>誕生日占い</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a2e;--ink-soft:#4a4a6a;--ink-muted:#8888aa;
  --paper:#faf9f6;--accent:#6b4fa0;--accent-light:#e8e0f5;
  --gold:#8a6500;--gold-light:#f5eed8;--teal:#2a7f7f;--teal-light:#e0f0f0;
  --coral:#b05050;--coral-light:#f5e8e8;--border:rgba(26,26,46,0.12);--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh}
.top-bar{height:3px;background:linear-gradient(90deg,var(--accent) 0%,#b8860b 50%,var(--teal) 100%)}
.page{max-width:720px;margin:0 auto;padding:3rem 1.5rem 5rem}
.hero{text-align:center;margin-bottom:2.5rem}
.hero-eyebrow{font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:0.3em;color:var(--accent);margin-bottom:0.75rem}
.hero h1{font-family:'Shippori Mincho',serif;font-size:clamp(26px,5vw,40px);font-weight:600;letter-spacing:0.08em;color:var(--ink);line-height:1.2;margin-bottom:0.75rem}
.hero-sub{font-size:14px;color:var(--ink-muted);letter-spacing:0.04em;line-height:1.9}
.divider{display:flex;align-items:center;gap:1rem;margin:2rem 0}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.divider-gem{width:6px;height:6px;background:var(--accent);transform:rotate(45deg);flex-shrink:0}
.tabs{display:flex;gap:0;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:2rem;background:#fff}
.tab{flex:1;padding:10px 0;font-family:'Shippori Mincho',serif;font-size:14px;letter-spacing:0.08em;color:var(--ink-muted);background:transparent;border:none;cursor:pointer;transition:all 0.15s;border-right:0.5px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{background:var(--accent);color:#fff;font-weight:500}
.tab:hover:not(.active){background:var(--accent-light);color:var(--accent)}
.input-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem}
.field-label{font-size:11px;color:var(--ink-muted);letter-spacing:0.12em;margin-bottom:6px;display:block}
.field-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.field-row:last-child{margin-bottom:0}
input[type="text"],input[type="date"]{height:44px;padding:0 14px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:300;color:var(--ink);background:var(--paper);border:0.5px solid var(--border);border-radius:8px;outline:none;transition:border-color 0.2s}
input[type="text"]{flex:1}
input[type="date"]{flex:1}
input:focus{border-color:var(--accent)}
.btn{height:44px;padding:0 24px;font-family:'Shippori Mincho',serif;font-size:15px;font-weight:500;letter-spacing:0.1em;color:#fff;background:var(--accent);border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:opacity 0.15s,transform 0.1s}
.btn:hover{opacity:0.88}
.btn:active{transform:scale(0.97)}
.btn-ghost{background:transparent;color:var(--ink-muted);border:0.5px solid var(--border);height:36px;padding:0 14px;font-size:13px;border-radius:8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--coral);border:0.5px solid var(--coral-light);height:30px;padding:0 10px;font-size:12px;border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s}
.btn-danger:hover{background:var(--coral-light)}


.empty-state{text-align:center;padding:3rem 1rem;color:var(--ink-muted);font-size:14px;line-height:2}
.empty-icon{font-size:32px;margin-bottom:0.5rem}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.result-avatar{width:48px;height:48px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-size:20px;color:var(--accent);flex-shrink:0}
.result-name{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600;color:var(--ink)}
.result-date{font-size:13px;color:var(--ink-muted);margin-top:2px}
/* ===== 結果カード ===== */
.result-panel{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem}
.rp-zodiac{padding:1.5rem 1.75rem 1.25rem;border-bottom:0.5px solid var(--border)}
.rp-zodiac-top{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem}
.rp-sym{font-size:28px;line-height:1}
.rp-name{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600;color:var(--ink)}
.rp-en{font-size:12px;color:var(--ink-muted);letter-spacing:0.08em}
.rp-elem{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-top:4px}
.rp-desc{font-size:13px;color:var(--ink-soft);line-height:1.85;margin-top:0.75rem}
/* ソウルナンバー行 */
.sn-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border)}
.sn-row:last-child{border-bottom:none}
.sn-cell{padding:1.25rem 1.5rem}
.sn-cell+.sn-cell{border-left:0.5px solid var(--border)}
.sn-label{font-size:10px;letter-spacing:0.12em;color:var(--ink-muted);margin-bottom:6px}
.sn-num{font-family:'Shippori Mincho',serif;font-size:42px;font-weight:600;color:var(--ink);line-height:1}
.sn-kw{font-size:12px;color:var(--ink-muted);margin-top:4px}
.sn-lunar-info{font-size:11px;color:var(--teal);margin-top:2px}
.sn-master{font-size:10px;background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 6px;display:inline-block;margin-top:3px}
/* 旧暦・六曜バー */
.lunar-bar{display:flex;align-items:center;gap:1.5rem;padding:0.9rem 1.5rem;border-bottom:0.5px solid var(--border);flex-wrap:wrap;row-gap:0.4rem}
.lunar-bar-item{display:flex;align-items:baseline;gap:0.35rem}
.lbi-label{font-size:10px;color:var(--ink-muted);letter-spacing:0.1em}
.lbi-val{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:500;color:var(--ink)}
.lbi-sep{color:var(--border);font-size:14px}
/* ソウルナンバー計算ステップ */
.sn-steps{padding:0 1.5rem 1.25rem}
.sn-steps-title{font-size:10px;letter-spacing:0.1em;color:var(--ink-muted);margin-bottom:0.6rem}
.calc-block{background:var(--paper);border-radius:8px;padding:0.875rem 1rem;font-size:13px;color:var(--ink-soft);line-height:1.9}
.calc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.calc-row:last-child{margin-bottom:0}
.calc-digits{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.calc-d{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:0.5px solid var(--border);border-radius:4px;font-family:'Shippori Mincho',serif;font-weight:500;font-size:13px;background:#fff;color:var(--ink)}
.calc-arrow{color:var(--ink-muted);font-size:12px;margin:0 2px}
.calc-sum{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600;color:var(--accent)}
.calc-label{font-size:11px;color:var(--ink-muted);white-space:nowrap}
/* 保存カード */
.saved-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.saved-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.15s;display:grid;grid-template-columns:1fr auto;gap:0.5rem;align-items:start}
.saved-card:hover{border-color:var(--accent)}
.sc-top{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem}
.sc-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-size:14px;color:var(--accent);flex-shrink:0}
.sc-name{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:500;color:var(--ink)}
.sc-date{font-size:11px;color:var(--ink-muted);margin-top:1px}
.sc-data{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sc-item{background:var(--paper);border-radius:7px;padding:7px 10px}
.sc-item-label{font-size:9px;letter-spacing:0.1em;color:var(--ink-muted);margin-bottom:2px}
.sc-item-val{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;color:var(--ink);line-height:1.1}
.sc-item-sub{font-size:10px;color:var(--ink-muted);margin-top:1px}
/* 旧来のクラス（後方互換） */
.tag{font-size:11px;letter-spacing:0.06em;padding:3px 10px;border-radius:20px}
.tag-purple{background:var(--accent-light);color:var(--accent)}
.tag-gold{background:var(--gold-light);color:var(--gold)}
.tag-teal{background:var(--teal-light);color:var(--teal)}
.summary-table{width:100%;border-collapse:collapse;font-size:13px}
.summary-table td{padding:8px 0;border-bottom:0.5px solid var(--border);vertical-align:top;line-height:1.7}
.summary-table td:first-child{color:var(--ink-muted);width:38%}
.summary-table tr:last-child td{border-bottom:none}
.hidden{display:none}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;margin-top:3rem;font-size:11px;color:var(--ink-muted);letter-spacing:0.08em}
.save-row{display:flex;justify-content:flex-end;margin-bottom:1rem}
@media(max-width:480px){
  .page{padding:2rem 1rem 4rem}
  .field-row{flex-wrap:wrap}
  .cards-grid{grid-template-columns:repeat(2,1fr)}
  .tabs .tab{font-size:12px;padding:9px 0}
  .lunar-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="page">
  <div class="hero">
    <p class="hero-eyebrow">BIRTHDAY READING</p>
    <h1>誕生日占い</h1>
    <p class="hero-sub">生年月日から星座・ソウルナンバー・旧暦を読み解きます</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('input')">✦ 新しく占う</button>
    <button class="tab" onclick="showTab('saved')">☽ 保存済み一覧</button>
  </div>
  <div id="tab-input">
    <div class="input-card">
      <label class="field-label">ニックネーム</label>
      <div class="field-row">
        <input type="text" id="nickname" placeholder="例：さくら、友達A、自分" maxlength="20" />
      </div>
      <label class="field-label">生年月日</label>
      <div class="field-row">
        <input type="text" id="bdate-y" placeholder="年" inputmode="numeric" maxlength="4" style="width:72px;flex:none" onkeydown="if(event.key==='Enter')calc()" oninput="if(this.value.length===4)document.getElementById('bdate-m').focus()" />
        <span style="color:var(--ink-muted);font-size:14px">年</span>
        <input type="text" id="bdate-m" placeholder="月" inputmode="numeric" maxlength="2" style="width:48px;flex:none" onkeydown="if(event.key==='Enter')calc()" oninput="if(this.value.length===2)document.getElementById('bdate-d').focus()" />
        <span style="color:var(--ink-muted);font-size:14px">月</span>
        <input type="text" id="bdate-d" placeholder="日" inputmode="numeric" maxlength="2" style="width:48px;flex:none" onkeydown="if(event.key==='Enter')calc()" />
        <span style="color:var(--ink-muted);font-size:14px">日</span>
        <button class="btn" onclick="calc()">占う</button>
      </div>
    </div>
    <div id="result" class="hidden">
      <div class="divider"><div class="divider-gem"></div></div>
      <div class="save-row"><button class="btn-ghost" onclick="saveEntry()">＋ 保存する</button></div>
      <div class="result-header">
        <div class="result-avatar" id="res-avatar"></div>
        <div><div class="result-name" id="res-name"></div><div class="result-date" id="res-date"></div></div>
      </div>
      <div id="sections"></div>
      <div class="footer">生年月日のデータに基づいた占いの参考情報です</div>
    </div>
  </div>
  <div id="tab-saved" class="hidden">
    <div id="saved-list-wrap"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

  {name:"山羊座",en:"Capricorn",sym:"♑",start:[12,22],end:[1,19],elem:"土",ruling:"土星",keyword:"忍耐・責任感・野心",desc:"堅実さと忍耐を武器に、高い目標を着実に登り続けるサイン。責任感が強く、どんな困難にも諦めません。長期的な計画と現実的な視点が持ち味で、社会的な成功を手にする力があります。"},
  {name:"水瓶座",en:"Aquarius",sym:"♒",start:[1,20],end:[2,18],elem:"風",ruling:"天王星",keyword:"革新・独立心・博愛",desc:"時代の一歩先を行く革新者。型にはまらない独自の発想で、既存の枠を超えていきます。人類全体への愛と理想主義を持ちながら、独立心も旺盛。友人を大切にし、広いコミュニティの中で輝きます。"},
  {name:"魚座",en:"Pisces",sym:"♓",start:[2,19],end:[3,20],elem:"水",ruling:"海王星",keyword:"直感・共感・夢想",desc:"深い共感力と豊かな想像力を持つ詩人のようなサイン。感受性が高く、目に見えないものを感じ取る直感があります。芸術・音楽・癒しの分野で才能を発揮し、周囲に安らぎをもたらします。"},
  {name:"牡羊座",en:"Aries",sym:"♈",start:[3,21],end:[4,19],elem:"火",ruling:"火星",keyword:"情熱・行動力・開拓",desc:"黄道12サインの第一番。誰よりも先に飛び込む勇気と行動力が特徴です。情熱的でエネルギッシュ、新しいことへの挑戦を恐れません。リーダーとして道を切り開く先駆者です。"},
  {name:"牡牛座",en:"Taurus",sym:"♉",start:[4,20],end:[5,20],elem:"土",ruling:"金星",keyword:"安定・忍耐・美的感覚",desc:"美しいものと心地よい環境を愛するサイン。五感が豊かで、質の高い生活を大切にします。一度決めたことをやり遂げる粘り強さと、信頼できる安定感が持ち味。着実に物事を積み上げる力があります。"},
  {name:"双子座",en:"Gemini",sym:"♊",start:[5,21],end:[6,20],elem:"風",ruling:"水星",keyword:"知性・多才・好奇心",desc:"知的好奇心が尽きない多才なコミュニケーター。どんなテーマでも素早く吸収し、軽やかに話を展開します。社交的で機転が利き、さまざまな人と場面に適応できる柔軟さが魅力です。"},
  {name:"蟹座",en:"Cancer",sym:"♋",start:[6,21],end:[7,22],elem:"水",ruling:"月",keyword:"感情豊か・母性・家庭",desc:"深い愛情と保護本能を持つサイン。家族と大切な人を守ることに喜びを感じます。感受性が高く、その場の雰囲気や人の感情を敏感に読み取ります。居心地のよい空間を作る才能があります。"},
  {name:"獅子座",en:"Leo",sym:"♌",start:[7,23],end:[8,22],elem:"火",ruling:"太陽",keyword:"自信・創造性・リーダー",desc:"太陽のように輝くカリスマとリーダーシップが特徴。舞台の中心に立つことで力を発揮します。創造的でドラマティックな表現力があり、周囲を惹きつける魅力を持っています。"},
  {name:"乙女座",en:"Virgo",sym:"♍",start:[8,23],end:[9,22],elem:"土",ruling:"水星",keyword:"分析力・完璧主義・奉仕",desc:"細部に宿る美しさを見逃さない分析の達人。完璧を追い求める職人気質と、人の役に立つことへの喜びが両立しています。論理的な思考と実務能力が高く、縁の下の力持ちとして信頼されます。"},
  {name:"天秤座",en:"Libra",sym:"♎",start:[9,23],end:[10,22],elem:"風",ruling:"金星",keyword:"調和・公正・美意識",desc:"バランスと美と正義を愛するサイン。物事の両面を見渡し、公平な判断を下す力があります。美的センスが高く、人間関係を大切にする外交官タイプ。対話と協調を通じて豊かな関係を築きます。"},
  {name:"蠍座",en:"Scorpio",sym:"♏",start:[10,23],end:[11,21],elem:"水",ruling:"冥王星",keyword:"洞察力・情熱・変革",desc:"表面の奥に隠れた真実を見通す洞察力の持ち主。情熱の深さは12サイン随一で、一度決めたことへの執念はゆるぎません。変容と再生の力を持ち、自分を何度でも新しく生まれ変わらせます。"},
  {name:"射手座",en:"Sagittarius",sym:"♐",start:[11,22],end:[12,21],elem:"火",ruling:"木星",keyword:"自由・冒険・楽観",desc:"地平線の先を常に目指す冒険家。旅・哲学・学びへの飽くなき探求心が特徴です。楽観的で率直、自由を何より大切にします。広い視野から物事の本質を捉え、真理を追い求めます。"},
];
const SOUL_INFO={
  1:{kw:"独立・先駆",desc:"自らの力で道を切り開くリーダータイプ。強い意志と独創性を持ち、ゼロから新しいものを生み出すことが得意です。"},
  2:{kw:"協調・感受",desc:"繊細な感受性と高い共感力でパートナーシップを大切にするタイプ。縁の下の支え手として信頼され、人をつなぐ才能があります。"},
  3:{kw:"創造・表現",desc:"豊かな創造力と明るいコミュニケーション力が持ち味。言葉・芸術・音楽など表現の場で才能を発揮します。"},

  5:{kw:"変化・自由",desc:"変化と冒険を愛し、自由の中でこそ輝くタイプ。好奇心旺盛で多才、新しい刺激に素早く適応します。"},
  6:{kw:"愛情・責任",desc:"愛と美と調和を大切にする養育者タイプ。家族・友人・コミュニティへの深い責任感があります。"},
  7:{kw:"内省・探究",desc:"真実と知恵を求める内省的な探究者。直感と分析力を兼ね備え、深く考え抜いた独自の世界観を持ちます。"},
  8:{kw:"達成・物質",desc:"強い意志と実行力で大きな成果を掴むタイプ。ビジネスや組織のマネジメントで力を発揮します。"},
  9:{kw:"博愛・完成",desc:"広い視野と深い慈愛で人類全体へ奉仕するタイプ。芸術・人道支援・教育などで社会に貢献し、感動を与えます。"},
  11:{kw:"直感・霊感",desc:"高い直感と霊的感受性を持つマスターナンバー。先見の明と精神的なインスピレーションで周囲を照らします。"},
  22:{kw:"実現・構築",desc:"夢を現実に変える最強の実践者を示すマスターナンバー。大きなビジョンと緻密な計画力で、社会に残る大きな仕事を成し遂げます。"},
  33:{kw:"愛・癒し",desc:"無条件の愛と癒しを体現するマスターナンバー。愛の教師として多くの人を導き、精神的な豊かさを分かち合います。"},
};

/* ===== 旧暦変換 (koyomi8方式: 朔日テーブル) =====
   各旧暦月の朔日(=旧暦1日)を新暦YYYYMMDD形式で格納。
   国立天文台・天文情報センターのデータおよびkoyomi8掲載データに準拠。
   閏月は月番号に100を加算(例: 閏4月=104)。
   通用期間: 1920〜2030年。

const STEMS=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const BRANCHES=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const ANIMALS=["ねずみ","うし","とら","うさぎ","たつ","へび","うま","ひつじ","さる","とり","いぬ","いのしし"];
const ROKKI=["大安","赤口","先勝","友引","先負","仏滅"];

function dateToInt(y,m,d){return y*10000+m*100+d;}

function toLunar(gy,gm,gd){
  const target=dateToInt(gy,gm,gd);
  // 朔日テーブルから該当月を探す
  let found=null;
  let foundIdx=-1;
  for(let i=0;i<SAKUJITSU.length;i++){
    if(SAKUJITSU[i][0]<=target){found=SAKUJITSU[i];foundIdx=i;}
    else break;
  }
  if(!found)return null;
  const [sakuInt,lmonthRaw]=found;
  // 旧暦日 = target - 朔日 + 1
  const sy=Math.floor(sakuInt/10000);
  const sm=Math.floor((sakuInt%10000)/100);
  const sd=sakuInt%100;
  // 日差を計算（Julian Day差）
  function toJD(y,m,d){
    const a=Math.floor((14-m)/12);const yr=y+4800-a;const mo=m+12*a-3;
    return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
  }
  const lday=toJD(gy,gm,gd)-toJD(sy,sm,sd)+1;
  const isLeap=lmonthRaw>100;
  const lmonth=isLeap?lmonthRaw-100:lmonthRaw;

  // 旧暦年を推定（その年の旧暦1月の朔日から判断）
  // 該当朔日が属する旧暦年を特定
  // 旧暦年 ≒ 旧暦1月の新暦年（春節の年）
  // 春節（旧暦1月1日）を探す
  let lunarYear=gy;
  for(let i=foundIdx;i>=0;i--){
    if(SAKUJITSU[i][1]===1){
      lunarYear=Math.floor(SAKUJITSU[i][0]/10000);
      break;
    }
  }

  const stemIdx=((lunarYear-4)%10+10)%10;
  const branchIdx=((lunarYear-4)%12+12)%12;

  // 日柱干支: JD基準で計算
  const jd=toJD(gy,gm,gd);
  const dStemIdx=((jd+40)%10+10)%10;
  const dBranchIdx=((jd+40)%12+12)%12;

  // 月柱干支: 年干支の天干番号×2＋月番号ベースで計算
  const mBranchIdx=(lmonth+1)%12;
  const mStemBase=(stemIdx%5)*2;
  const mStemIdx=(mStemBase+(lmonth-1))%10;

  // 六曜: (旧暦月+旧暦日) % 6
  const rokuyo=ROKKI[(lmonth+lday)%6];

  return{
    month:lmonth,day:lday,isLeap,
    lunarYear,
    yearStem:STEMS[stemIdx],yearBranch:BRANCHES[branchIdx],animal:ANIMALS[branchIdx],
    eto:STEMS[stemIdx]+BRANCHES[branchIdx],
    mStem:STEMS[mStemIdx],mBranch:BRANCHES[mBranchIdx],
    dStem:STEMS[dStemIdx],dBranch:BRANCHES[dBranchIdx],
    rokuyo,
  };
}

/* ===== NUMEROLOGY ===== */
function getZodiac(m,d){
  for(const z of ZODIAC){
    const[sm,sd]=z.start,[em,ed]=z.end;
    if(sm>em){if((m===sm&&d>=sd)||(m===em&&d<=ed))return z;}
    else{if((m===sm&&d>=sd)||(m>sm&&m<em)||(m===em&&d<=ed))return z;}
  }
  return ZODIAC[0];
}
function reduceNum(n){
  if([11,22,33].includes(n))return n;
  while(n>9){n=String(n).split('').reduce((a,c)=>a+parseInt(c),0);if([11,22,33].includes(n))return n;}
  return n;
}
function soulNumSteps(y,m,d){
  const digits=(String(y)+String(m).padStart(2,'0')+String(d).padStart(2,'0')).split('').map(Number);
  const steps=[digits.slice()];
  let total=digits.reduce((a,c)=>a+c,0);
  const finals=[total];
  while(total>9&&![11,22,33].includes(total)){
    const ds=String(total).split('').map(Number);
    steps.push(ds);
    total=ds.reduce((a,c)=>a+c,0);
    finals.push(total);
  }
  return{digits,steps,result:total,finals};
}
function isMaster(n){return[11,22,33].includes(n);}

/* ===== UI HELPERS ===== */
function showTab(t){
  document.getElementById('tab-input').classList.toggle('hidden',t!=='input');
  document.getElementById('tab-saved').classList.toggle('hidden',t!=='saved');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='input'&&i===0)||(t==='saved'&&i===1)));
  if(t==='saved')renderSaved();
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
function calcStepsHTML(info){
  const{digits,steps,result,finals}=info;
  let h='<div class="calc-block">';
  h+='<div class="calc-row"><span class="calc-label">数字を並べる：</span><div class="calc-digits">';
  digits.forEach((d,i)=>{h+=`<span class="calc-d">${d}</span>`;if(i<digits.length-1)h+='<span class="calc-arrow">＋</span>';});
  h+=`<span class="calc-arrow">＝</span><span class="calc-sum">${finals[0]}</span>`;
  h+='</div></div>';
  for(let s=1;s<steps.length;s++){
    h+='<div class="calc-row"><span class="calc-label">さらに足す：</span><div class="calc-digits">';
    steps[s].forEach((d,i)=>{h+=`<span class="calc-d">${d}</span>`;if(i<steps[s].length-1)h+='<span class="calc-arrow">＋</span>';});
    h+=`<span class="calc-arrow">＝</span><span class="calc-sum">${finals[s]}</span>`;
    h+='</div></div>';
  }
  h+=`<div style="font-size:12px;color:var(--ink-muted);margin-top:4px">→ ソウルナンバー：<strong style="color:var(--accent);font-family:'Shippori Mincho',serif;font-size:15px">${result}</strong>${isMaster(result)?'（マスターナンバー）':''}</div>`;
  h+='</div>';
  return h;
}

let _cur=null;

function calc(){
  const y=parseInt(document.getElementById('bdate-y').value,10);
  const m=parseInt(document.getElementById('bdate-m').value,10);
  const d=parseInt(document.getElementById('bdate-d').value,10);
  if(!y||!m||!d){toast('年・月・日をすべて入力してください');return;}
  if(y<1920||y>2025||m<1||m>12||d<1||d>31){toast('正しい日付を入力してください');return;}
  const v=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const nick=document.getElementById('nickname').value.trim()||'名無し';
  const z=getZodiac(m,d);
  const snInfo=soulNumSteps(y,m,d);
  const sn=snInfo.result;
  const lunar=toLunar(y,m,d);
  let lsn=null,lsnInfo=null;
  if(lunar){lsnInfo=soulNumSteps(y,lunar.month,lunar.day);lsn=lsnInfo.result;}
  _cur={nick,dob:v,y,m,d,z,sn,snInfo,lunar,lsn,lsnInfo};
  renderResult(_cur);
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

  document.getElementById('sections').innerHTML=`

            <div class="rp-name">${z.name}</div>

          </div>
        </div>
        <span class="rp-elem" style="background:${bg};color:${fg}">${z.elem}のサイン　支配星 ${z.ruling}</span>
        <p class="rp-desc">${z.desc}</p>
      </div>

      ${lunar?('<div class="lunar-bar"><div class="lunar-bar-item"><span class="lbi-label">旧暦</span><span class="lbi-val">'+lunar.lunarYear+'年'+(lunar.isLeap?'閏':'')+lunar.month+'月'+lunar.day+'日</span></div><span class="lbi-sep">|</span><div class="lunar-bar-item"><span class="lbi-label">六曜</span><span class="lbi-val">'+lunar.rokuyo+'</span></div></div>'):''}

      <!-- ソウルナンバー -->
      <div class="sn-row">
        <div class="sn-cell">
          <div class="sn-label">ソウルナンバー（新暦）</div>
          <div class="sn-num">${sn}</div>
          ${isMaster(sn)?'<div class="sn-master">Master Number</div>':''}
          <div class="sn-kw">${SOUL_INFO[sn].kw}</div>
        </div>
        ${(lunar&&lsn)?('<div class="sn-cell"><div class="sn-label">ソウルナンバー（旧暦）</div><div class="sn-num">'+lsn+'</div>'+(isMaster(lsn)?'<div class="sn-master">Master Number</div>':'')+'<div class="sn-kw">'+SOUL_INFO[lsn].kw+'</div></div>'):''}

        <div class="sn-steps-title">計算の流れ（${y}年${m}月${d}日）</div>
        ${calcStepsHTML(snInfo)}
        ${(lunar&&lsn&&lsn!==sn&&lsnInfo)?('<div class="sn-steps-title" style="margin-top:0.75rem">旧暦（'+(lunar.isLeap?'閏':'')+lunar.month+'月'+lunar.day+'日）</div>'+calcStepsHTML(lsnInfo)):''}
      </div>

}

/* ===== SAVE ===== */
function saveEntry(){
  if(!_cur){toast('先に占ってください');return;}
  const entries=loadEntries();
  if(entries.find(e=>e.nick===_cur.nick&&e.dob===_cur.dob)){toast('同じニックネーム＋誕生日はすでに保存済みです');return;}
  const{nick,dob,y,m,d,sn,lsn,lunar}=_cur;const z=_cur.z;
  entries.unshift({
    id:Date.now(),nick,dob,y,m,d,savedAt:new Date().toLocaleDateString('ja-JP'),
    zName:z.name,zSym:z.sym,zElem:z.elem,zRuling:z.ruling,zKeyword:z.keyword,zEn:z.en,zDesc:z.desc,
    sn,lsn,
    lunarYear:lunar?lunar.lunarYear:null,lunarMonth:lunar?lunar.month:null,lunarDay:lunar?lunar.day:null,
    lunarIsLeap:lunar?lunar.isLeap:false,lunarRokuyo:lunar?lunar.rokuyo:null,
  });
  saveEntries(entries);
  toast(nick+' を保存しました ✦');
}

/* ===== SAVED LIST ===== */
function renderSaved(){
  const entries=loadEntries();
  const wrap=document.getElementById('saved-list-wrap');

    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">☽</div><div>保存された記録がありません<br>「新しく占う」タブから占って保存してみましょう</div></div>';
    return;
  }
  wrap.innerHTML='<div class="saved-list">'+entries.map(e=>{
    const lunarSn=e.lsn||(e.lunarMonth?soulNumSteps(e.y,e.lunarMonth,e.lunarDay).result:null);
    const dobParts=e.dob.split('-');const dobStr=dobParts[0]+'年'+parseInt(dobParts[1])+'月'+parseInt(dobParts[2])+'日';

    return `
    <div class="saved-card" onclick="viewEntry(${e.id})">

}

function viewEntry(id){
  const e=loadEntries().find(x=>x.id===id);if(!e)return;
  const z=ZODIAC.find(z=>z.name===e.zName)||{name:e.zName,sym:e.zSym,elem:e.zElem,ruling:e.zRuling,keyword:e.zKeyword,en:e.zEn,desc:e.zDesc,start:[1,1],end:[1,1]};
  const snInfo=soulNumSteps(e.y,e.m,e.d);
  const lunar=toLunar(e.y,e.m,e.d);
  let lsn=null,lsnInfo=null;
  if(lunar){lsnInfo=soulNumSteps(e.y,lunar.month,lunar.day);lsn=lsnInfo.result;}
  _cur={nick:e.nick,dob:e.dob,y:e.y,m:e.m,d:e.d,z,sn:e.sn,snInfo,lunar,lsn,lsnInfo};
  document.getElementById('nickname').value=e.nick;
  const dobParts=e.dob.split('-');
  document.getElementById('bdate-y').value=parseInt(dobParts[0]);
  document.getElementById('bdate-m').value=parseInt(dobParts[1]);
  document.getElementById('bdate-d').value=parseInt(dobParts[2]);
  renderResult(_cur);
  document.getElementById('result').classList.remove('hidden');
  showTab('input');
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function deleteEntry(id){
  if(!confirm('この記録を削除しますか？'))return;
  saveEntries(loadEntries().filter(e=>e.id!==id));
  renderSaved();toast('削除しました');
}
